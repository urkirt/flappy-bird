<!DOCTYPE html>
<html lang="en">
<head>
<title>Play Flappy Bird Game Online</title>

<!-- SEO -->
<meta name="description" content="Play the Flappy Bird browser game online for free. Smooth gameplay, simple controls, and fun challenges. Made by urkirt.">
<meta name="keywords" content="flappy bird game, play flappy bird online, free flappy bird, flappy bird browser game, flappy bird remake">
<meta name="author" content="urkirt">

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: skyblue;
        font-family: Arial, sans-serif;
    }
    h1, p {
        text-align: center;
        margin: 10px;
        color: white;
        text-shadow: 0px 0px 5px black;
    }
    canvas {
        display: block;
        margin: auto;
    }
</style>
</head>

<body>

<h1>Play Flappy Bird Game Online</h1>
<p>A simple, fun, smooth Flappy Bird game you can play for free. Created by urkirt.</p>

<canvas id="gameCanvas" width="360" height="520"></canvas>

<script>
// Canvas
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Load images (GitHub-safe links)
const birdImg = new Image();
birdImg.src = "https://raw.githubusercontent.com/CodeExplainedRepo/FlappyBird-JavaScript/master/images/bird.png";

const bgImg = new Image();
bgImg.src = "https://raw.githubusercontent.com/CodeExplainedRepo/FlappyBird-JavaScript/master/images/bg.png";

const fgImg = new Image();
fgImg.src = "https://raw.githubusercontent.com/CodeExplainedRepo/FlappyBird-JavaScript/master/images/fg.png";

const pipeNorthImg = new Image();
pipeNorthImg.src = "https://raw.githubusercontent.com/CodeExplainedRepo/FlappyBird-JavaScript/master/images/pipeNorth.png";

const pipeSouthImg = new Image();
pipeSouthImg.src = "https://raw.githubusercontent.com/CodeExplainedRepo/FlappyBird-JavaScript/master/images/pipeSouth.png";

// Sounds
const flySound = new Audio("https://raw.githubusercontent.com/CodeExplainedRepo/FlappyBird-JavaScript/master/sounds/fly.mp3");
const scoreSound = new Audio("https://raw.githubusercontent.com/CodeExplainedRepo/FlappyBird-JavaScript/master/sounds/score.mp3");

// Bird physics
let birdX = 50;
let birdY = 150;
let gravity = 1.3;

// Pipes
let pipes = [];
pipes[0] = { x: canvas.width, y: 0 };

// Gap
let gap = 140;

// Score
let score = 0;

// Controls
document.addEventListener("keydown", jump);
document.addEventListener("mousedown", jump);

function jump() {
    birdY -= 25;
    flySound.play();
}

// Game loop
function draw() {
    ctx.drawImage(bgImg, 0, 0);

    for (let i = 0; i < pipes.length; i++) {
        let constant = pipeNorthImg.height + gap;

        ctx.drawImage(pipeNorthImg, pipes[i].x, pipes[i].y);
        ctx.drawImage(pipeSouthImg, pipes[i].x, pipes[i].y + constant);

        pipes[i].x--;

        if (pipes[i].x === 100) {
            pipes.push({
                x: canvas.width,
                y: Math.floor(Math.random() * pipeNorthImg.height) - pipeNorthImg.height
            });
        }

        // Collision
        if (
            birdX + birdImg.width >= pipes[i].x &&
            birdX <= pipes[i].x + pipeNorthImg.width &&
            (birdY <= pipes[i].y + pipeNorthImg.height ||
             birdY + birdImg.height >= pipes[i].y + constant)
        ) {
            location.reload(); // Restart game
        }

        // Score
        if (pipes[i].x === 0) {
            score++;
            scoreSound.play();
        }
    }

    ctx.drawImage(fgImg, 0, canvas.height - fgImg.height);
    ctx.drawImage(birdImg, birdX, birdY);

    birdY += gravity;

    if (birdY + birdImg.height >= canvas.height - fgImg.height) {
        location.reload();
    }

    // Score text
    ctx.fillStyle = "#fff";
    ctx.font = "25px Arial";
    ctx.fillText("Score: " + score, 10, canvas.height - 20);

    requestAnimationFrame(draw);
}

pipeSouthImg.onload = draw;
</script>

</body>
</html>
