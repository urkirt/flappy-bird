<!DOCTYPE html>
<html>
<head>
<title>Flappy Bird Upgraded</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #4ec0ca;
    }
    canvas {
        display: block;
        margin: auto;
        background: url("https://i.imgur.com/O7B6fFv.png");
        background-size: cover;
        image-rendering: pixelated;
    }
</style>
</head>
<body>
<canvas id="gameCanvas" width="350" height="500"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Load images
const birdImg = new Image();
birdImg.src = "https://i.imgur.com/sjv4JqP.png";

const pipeTopImg = new Image();
pipeTopImg.src = "https://i.imgur.com/5R3jlW9.png";

const pipeBottomImg = new Image();
pipeBottomImg.src = "https://i.imgur.com/0ugH3RB.png";

// Load sound
const flapSound = new Audio("https://actions.google.com/sounds/v1/cartoon/slide_whistle_to_drum_hit.ogg");

// Bird
let bird = {
    x: 50,
    y: 200,
    width: 34,
    height: 24,
    gravity: 0.35,
    lift: -7,
    velocity: 0
};

// Pipes
let pipes = [];
let gap = 130;
let pipeWidth = 52;
let frame = 0;
let score = 0;
let gameOver = false;

// Controls
document.addEventListener("keydown", () => jump());
document.addEventListener("mousedown", () => jump());
function jump() {
    bird.velocity = bird.lift;
    flapSound.play();
}

// Spawn pipes
function createPipes() {
    if (frame % 90 === 0) {
        let topHeight = Math.random() * (canvas.height - gap - 80);
        pipes.push({
            x: canvas.width,
            top: topHeight,
            bottom: topHeight + gap
        });
    }
}

// Draw pipes
function drawPipes() {
    pipes.forEach(pipe => {
        ctx.drawImage(pipeTopImg, pipe.x, pipe.top - pipeTopImg.height);
        ctx.drawImage(pipeBottomImg, pipe.x, pipe.bottom);
    });
}

// Update pipes
function updatePipes() {
    pipes.forEach(pipe => {
        pipe.x -= 2;

        if (pipe.x + pipeWidth === bird.x) score++;

        if (
            bird.x < pipe.x + pipeWidth &&
            bird.x + bird.width > pipe.x &&
            (bird.y < pipe.top || bird.y + bird.height > pipe.bottom)
        ) {
            gameOver = true;
        }
    });

    pipes = pipes.filter(p => p.x + pipeWidth > 0);
}

// Draw bird
function drawBird() {
    ctx.drawImage(birdImg, bird.x, bird.y, bird.width, bird.height);
}

// Update bird
function updateBird() {
    bird.velocity += bird.gravity;
    bird.y += bird.velocity;

    if (bird.y + bird.height >= canvas.height || bird.y <= 0) gameOver = true;
}

// Score
function drawScore() {
    ctx.fillStyle = "white";
    ctx.font = "24px Arial";
    ctx.fillText("Score: " + score, 10, 30);
}

// Main loop
function loop() {
    if (gameOver) {
        ctx.fillStyle = "black";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER", 70, 250);
        ctx.font = "28px Arial";
        ctx.fillText("Score: " + score, 120, 290);
        return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    createPipes();
    drawPipes();
    updatePipes();
    drawBird();
    updateBird();
    drawScore();

    frame++;
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
